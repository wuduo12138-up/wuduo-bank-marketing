services:
  # ===================== MySQL 8.0 =====================
  mysql:
    image: mysql:8.0
    container_name: wuduo-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-wuduo123}
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_general_ci
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_general_ci
      --max-connections=500
      --innodb-buffer-pool-size=256M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-wuduo123}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wuduo-net

  # ===================== Redis 7 =====================
  redis:
    image: redis:7-alpine
    container_name: wuduo-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-wuduo123}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-wuduo123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wuduo-net

  # ===================== Nacos 2.x (Standalone) =====================
  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: wuduo-nacos
    restart: unless-stopped
    environment:
      MODE: standalone
      SPRING_DATASOURCE_PLATFORM: mysql
      MYSQL_SERVICE_HOST: mysql
      MYSQL_SERVICE_PORT: 3306
      MYSQL_SERVICE_DB_NAME: nacos
      MYSQL_SERVICE_USER: root
      MYSQL_SERVICE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-wuduo123}
      NACOS_AUTH_ENABLE: "true"
      NACOS_AUTH_TOKEN: "V3VkdW9CYW5rTWFya2V0aW5nTmFjb3NTZWNyZXRLZXkyMDI2MTIzNDU2Nzg5MA=="
      NACOS_AUTH_IDENTITY_KEY: serverIdentity
      NACOS_AUTH_IDENTITY_VALUE: security
      JVM_XMS: 256m
      JVM_XMX: 512m
    ports:
      - "${NACOS_PORT:-8848}:8848"
      - "${NACOS_GRPC_PORT:-9848}:9848"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - nacos-logs:/home/nacos/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/v1/console/health/readiness"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - wuduo-net

volumes:
  mysql-data:
    name: wuduo-mysql-data
  redis-data:
    name: wuduo-redis-data
  nacos-logs:
    name: wuduo-nacos-logs

networks:
  wuduo-net:
    name: wuduo-bank-marketing
    driver: bridge
